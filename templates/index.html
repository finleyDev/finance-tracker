<!DOCTYPE html>
<html>
    <head>
        <style>
            body{font-family: Arial, Helvetica, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            background-color: #f5f5f5;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #1a56a0;
            color: white;
        }
        </style>
        <title>Finance Tracker</title>
    </head>
    <body>
        <h1> Finance Tracker </h1>
        <a href="{{url_for('login')}}">Login Page</a>
        <p> Welcome to your personal finance tracker </p>
        <table>
            <tr>
               <th>Category</th>
               <th>Amount</th>
               <th>Date</th>
               <th>Action</th>
            </tr>
            {% for entry in entries %}
            <tr>
                <td>{{ entry.category }}</td>
                <td>{{ entry.amount }}</td>
                <td>{{ entry.date }}</td>
                <td>
                    <form action="/delete/{{ loop.index0 }}" method="POST">
                        <button type="submit">Delete</button>

                    </form>
                </td>
            </tr>
            {% endfor %}
        </table>
        <p><strong>Total spent: {{ total }} </strong></p>
        <h2>Add Expense</h2>
        <form action="/add" method="POST">
            <select name="category">
                <option>Food</option>
                <option>Clothes</option>
                <option>Girlfriend</option>
                <option>Learn</option>
            </select>
            <input type="number" name="amount" min="1" placeholder="Amount in €">
            <button type="submit">Add Entry</button>
        <h2>Chart</h2>
        <img src="/static/bar.png?v={{ timestamp }}">
    </body>
</html>
